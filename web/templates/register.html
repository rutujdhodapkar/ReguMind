<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Phantom Compliance</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
<div class="login-container">
  <div class="login-card" style="max-width:480px">
    <div class="login-brand">
      <div class="brand-icon">👤</div>
      <h1>Create Account</h1>
      <p>Register for Phantom Compliance</p>
    </div>
    <div id="form-error" class="form-error"></div>
    <div id="form-success" style="display:none;text-align:center;padding:1rem">
      <p style="font-size:1.1rem;margin-bottom:0.5rem">Account created!</p>
      <p>You can now <a href="/">login</a> with your credentials.</p>
    </div>
    <form class="login-form" id="register-form">
      <div class="form-row">
        <div class="form-group">
          <label for="username">Username *</label>
          <input type="text" id="username" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="display_name">Display Name</label>
          <input type="text" id="display_name" class="form-control">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" class="form-control" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm Password *</label>
          <input type="password" id="confirm_password" class="form-control" required>
        </div>
      </div>
      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" class="form-control">
          <option value="KYC">KYC / Compliance</option>
          <option value="Payments">Payments / IT</option>
          <option value="IT_Security">IT Security / Audit</option>
          <option value="Treasury">Treasury / Risk</option>
          <option value="Forex">Forex / Treasury</option>
          <option value="Credit_Risk">Credit / Stressed Assets</option>
        </select>
      </div>
      <hr style="border:none;border-top:1px solid var(--border);margin:1rem 0">
      <p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:1rem">
        Set a security question for password recovery (recommended)
      </p>
      <div class="form-group">
        <label for="security_question">Security Question</label>
        <select id="security_question" class="form-control">
          <option value="">-- No security question --</option>
          <option value="What was your first pet's name?">What was your first pet's name?</option>
          <option value="What city were you born in?">What city were you born in?</option>
          <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
          <option value="What was the name of your first school?">What was the name of your first school?</option>
          <option value="What is your favorite book?">What is your favorite book?</option>
          <option value="Custom">Custom question...</option>
        </select>
      </div>
      <div class="form-group" id="custom-question-group" style="display:none">
        <label for="custom_question">Your Question</label>
        <input type="text" id="custom_question" class="form-control" placeholder="Type your question">
      </div>
      <div class="form-group">
        <label for="security_answer">Security Answer</label>
        <input type="text" id="security_answer" class="form-control" placeholder="Your answer">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      <p style="text-align:center;margin-top:1rem;font-size:0.85rem">
        Already have an account? <a href="/">Login</a>
      </p>
    </form>
  </div>
</div>
<script>
document.getElementById('security_question').addEventListener('change', function(){
  document.getElementById('custom-question-group').style.display = this.value === 'Custom' ? 'block' : 'none';
});
document.getElementById('register-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const err = document.getElementById('form-error');
  err.textContent = '';
  const btn = this.querySelector('button');
  btn.disabled = true; btn.textContent = 'Creating account...';
  const sq = document.getElementById('security_question');
  let question = sq.value;
  if (question === 'Custom') question = document.getElementById('custom_question').value;
  try {
    const r = await fetch('/api/register', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        confirm_password: document.getElementById('confirm_password').value,
        display_name: document.getElementById('display_name').value,
        role: document.getElementById('role').value,
        security_question: question,
        security_answer: document.getElementById('security_answer').value,
      })
    });
    const d = await r.json();
    if (d.ok) {
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('form-success').style.display = 'block';
    } else {
      err.textContent = d.error || 'Registration failed';
    }
  } catch(e) { err.textContent = 'Connection error'; }
  btn.disabled = false; btn.textContent = 'Create Account';
});
</script>
</body>
</html>
