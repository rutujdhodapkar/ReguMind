<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - Phantom Compliance</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
<div class="login-container">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon">🔑</div>
      <h1>Reset Password</h1>
      <p>Answer your security question to reset</p>
    </div>
    <div id="form-error" class="form-error"></div>

    <!-- Step 1: Username -->
    <div id="step-username">
      <form class="login-form" id="step1-form">
        <div class="form-group">
          <label for="fp-username">Username</label>
          <input type="text" id="fp-username" class="form-control" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Next</button>
        <p style="text-align:center;margin-top:1rem;font-size:0.85rem">
          <a href="/">Back to Login</a>
        </p>
      </form>
    </div>

    <!-- Step 2: Security Question -->
    <div id="step-question" style="display:none">
      <form class="login-form" id="step2-form">
        <div class="form-group">
          <label>Security Question</label>
          <p id="display-question" style="font-weight:600;padding:0.5rem 0"></p>
        </div>
        <div class="form-group">
          <label for="fp-answer">Your Answer</label>
          <input type="text" id="fp-answer" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Verify</button>
      </form>
    </div>

    <!-- Step 3: New Password -->
    <div id="step-reset" style="display:none">
      <form class="login-form" id="step3-form">
        <div class="form-group">
          <label for="fp-new-password">New Password</label>
          <input type="password" id="fp-new-password" class="form-control" required minlength="6">
        </div>
        <div class="form-group">
          <label for="fp-confirm">Confirm New Password</label>
          <input type="password" id="fp-confirm" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
      </form>
    </div>

    <!-- Step 4: Done -->
    <div id="step-done" style="display:none;text-align:center;padding:1rem">
      <p style="font-size:1.1rem;margin-bottom:0.5rem">Password reset successfully!</p>
      <p>You can now <a href="/">login</a> with your new password.</p>
    </div>
  </div>
</div>
<script>
let resetToken = '';
let userId = 0;

document.getElementById('step1-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const err = document.getElementById('form-error');
  err.textContent = '';
  const username = document.getElementById('fp-username').value;
  const btn = this.querySelector('button');
  btn.disabled = true; btn.textContent = 'Checking...';
  try {
    const r = await fetch('/api/forgot-password/question', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username})
    });
    const d = await r.json();
    if (d.question) {
      document.getElementById('display-question').textContent = d.question;
      userId = d.user_id;
      document.getElementById('step-username').style.display = 'none';
      document.getElementById('step-question').style.display = 'block';
    } else {
      err.textContent = d.error || 'User not found or no security question set';
    }
  } catch(e) { err.textContent = 'Connection error'; }
  btn.disabled = false; btn.textContent = 'Next';
});

document.getElementById('step2-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const err = document.getElementById('form-error');
  err.textContent = '';
  const answer = document.getElementById('fp-answer').value;
  const btn = this.querySelector('button');
  btn.disabled = true; btn.textContent = 'Verifying...';
  try {
    const r = await fetch('/api/forgot-password/verify', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({user_id: userId, answer})
    });
    const d = await r.json();
    if (d.ok) {
      resetToken = d.token;
      document.getElementById('step-question').style.display = 'none';
      document.getElementById('step-reset').style.display = 'block';
    } else {
      err.textContent = d.error || 'Incorrect answer';
    }
  } catch(e) { err.textContent = 'Connection error'; }
  btn.disabled = false; btn.textContent = 'Verify';
});

document.getElementById('step3-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const err = document.getElementById('form-error');
  err.textContent = '';
  const np = document.getElementById('fp-new-password').value;
  const cf = document.getElementById('fp-confirm').value;
  if (np !== cf) { err.textContent = 'Passwords do not match'; return; }
  if (np.length < 6) { err.textContent = 'Password must be at least 6 characters'; return; }
  const btn = this.querySelector('button');
  btn.disabled = true; btn.textContent = 'Resetting...';
  try {
    const r = await fetch('/api/forgot-password/reset', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({token: resetToken, new_password: np, confirm_password: cf})
    });
    const d = await r.json();
    if (d.ok) {
      document.getElementById('step-reset').style.display = 'none';
      document.getElementById('step-done').style.display = 'block';
    } else {
      err.textContent = d.error || 'Reset failed';
    }
  } catch(e) { err.textContent = 'Connection error'; }
  btn.disabled = false; btn.textContent = 'Reset Password';
});
</script>
</body>
</html>
