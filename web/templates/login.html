<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantom Compliance - Login</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
<div class="login-container">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon">⚖</div>
      <h1>Phantom Compliance</h1>
      <p>Agentic Regulatory Compliance System</p>
    </div>
    <div id="first-run-banner" style="display:none;background:#f0f0f0;border:1px solid #000;border-radius:4px;padding:1rem;margin-bottom:1.5rem;font-size:0.85rem">
      <strong style="font-size:0.9rem">First Run</strong><br>
      Username: <code>admin</code><br>
      Password: <code id="admin-pw">loading...</code><br>
      <span style="color:#666;font-size:0.78rem">Save this password. It will not be shown again.</span>
    </div>
    <form class="login-form" id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div class="form-error" id="login-error"></div>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>
      <div style="text-align:center;margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1rem;font-size:0.85rem">
        <a href="/register" style="margin-right:1.5rem">Create Account</a>
        <a href="/forgot-password">Forgot Password?</a>
      </div>
  </div>
</div>
<script>
fetch('/api/first-run').then(r=>r.json()).then(d=>{
  if(d.is_first_run && d.admin_password){
    document.getElementById('first-run-banner').style.display = 'block';
    document.getElementById('admin-pw').textContent = d.admin_password;
  }
});
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const err = document.getElementById('login-error');
  err.textContent = '';
  const btn = this.querySelector('button');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const r = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: this.username.value, password: this.password.value})
    });
    const d = await r.json();
    if (d.ok) { window.location.href = '/dashboard'; }
    else { err.textContent = d.error || 'Login failed'; }
  } catch(e) { err.textContent = 'Connection error'; }
  btn.disabled = false; btn.textContent = 'Login';
});
</script>
</body>
</html>
